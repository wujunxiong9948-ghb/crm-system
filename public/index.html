<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#001529" />
    <meta name="description" content="酒店家具CRM系统 - 专业的客户关系管理解决方案" />
    <meta name="keywords" content="CRM, 客户管理, 销售管理, 酒店家具, 订单管理" />
    <meta name="author" content="源臻酒店家具" />

    <!-- Open Graph 标签 -->
    <meta property="og:title" content="酒店家具CRM系统" />
    <meta property="og:description" content="专业的客户关系管理解决方案" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://crm.example.com" />

    <!-- 苹果标签 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CRM系统" />

    <!-- 微软标签 -->
    <meta name="msapplication-TileColor" content="#001529" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/logo192.png" />

    <!-- 链接预加载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 清单文件 -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>酒店家具CRM系统</title>

    <!-- 样式预加载 -->
    <style>
      /* 加载动画 */
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #e6e6e6;
        border-top-color: #1890ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* 基础样式 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f0f2f5;
      }

      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
      }

      /* 打印样式 */
      @media print {
        .no-print {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- 加载动画 -->
    <div id="loading">
      <div class="loading-spinner"></div>
    </div>

    <!-- 根容器 -->
    <noscript>您需要启用JavaScript才能运行此应用程序。</noscript>
    <div id="root"></div>

    <!-- 加载脚本 -->
    <script>
      // 隐藏加载动画
      window.addEventListener('load', function() {
        var loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          setTimeout(function() {
            loading.style.display = 'none';
          }, 300);
        }
      });

      // 错误处理
      window.addEventListener('error', function(event) {
        console.error('应用程序错误:', event.error);

        // 显示错误信息
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed;top:20px;right:20px;background:#ff4d4f;color:white;padding:15px;border-radius:4px;z-index:10000;max-width:400px;';
        errorDiv.innerHTML = '<strong>应用程序错误</strong><br>请刷新页面或联系技术支持。';
        document.body.appendChild(errorDiv);

        // 5秒后自动移除
        setTimeout(function() {
          if (errorDiv.parentNode) {
            errorDiv.parentNode.removeChild(errorDiv);
          }
        }, 5000);
      });

      // 离线检测
      window.addEventListener('offline', function() {
        console.log('网络连接已断开');
        // 可以在这里显示离线提示
      });

      window.addEventListener('online', function() {
        console.log('网络连接已恢复');
        // 可以在这里隐藏离线提示
      });

      // 服务Worker注册
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').then(
            function(registration) {
              console.log('ServiceWorker 注册成功: ', registration.scope);
            },
            function(err) {
              console.log('ServiceWorker 注册失败: ', err);
            }
          );
        });
      }
    </script>
  </body>
</html>
